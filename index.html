<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="旅日翻譯" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/svg+xml" href="icon-180.svg" />
  <title>日中即時翻譯 | 旅日好幫手</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== Dark theme (default) ===== */
    [data-theme="dark"]{
      --bg:#0a0c10;
      --panel:rgba(255,255,255,0.05);
      --panel2:rgba(255,255,255,0.02);
      --border:rgba(255,255,255,0.08);
      --muted:rgba(255,255,255,0.6);
      --text:rgba(255,255,255,0.92);
      --danger:rgba(248,113,113,0.95);
      --dangerBg:rgba(248,113,113,0.10);
      --dangerBd:rgba(248,113,113,0.25);
      --success:rgba(16,185,129,0.95);
      --successBg:rgba(16,185,129,0.12);
      --blue:rgba(96,165,250,0.95);
      --blueBg:rgba(96,165,250,0.10);
      --blueBd:rgba(96,165,250,0.30);
      --chipBg:rgba(0,0,0,0.35);
      --chipBd:rgba(255,255,255,0.10);
      --focus:rgba(255,255,255,0.18);
      --toastBg:rgba(20,22,28,0.95);
      --toastBd:rgba(255,255,255,0.12);
      --bodyBg:var(--bg);
      --skelBar:rgba(255,255,255,0.06);
      --outColor:rgba(130,177,255,0.95);
      --accent:#6ee7b7;
      --accentBg:rgba(110,231,183,0.10);
      --accentBd:rgba(110,231,183,0.30);
    }

    /* ===== Light theme ===== */
    [data-theme="light"]{
      --bg:#f4f5f7;
      --panel:rgba(0,0,0,0.03);
      --panel2:rgba(0,0,0,0.01);
      --border:rgba(0,0,0,0.08);
      --muted:rgba(0,0,0,0.50);
      --text:rgba(0,0,0,0.88);
      --danger:rgba(220,53,69,0.95);
      --dangerBg:rgba(220,53,69,0.08);
      --dangerBd:rgba(220,53,69,0.25);
      --success:rgba(22,163,74,0.95);
      --successBg:rgba(22,163,74,0.10);
      --blue:rgba(59,130,246,0.95);
      --blueBg:rgba(59,130,246,0.08);
      --blueBd:rgba(59,130,246,0.25);
      --chipBg:rgba(0,0,0,0.05);
      --chipBd:rgba(0,0,0,0.10);
      --focus:rgba(0,0,0,0.12);
      --toastBg:rgba(255,255,255,0.96);
      --toastBd:rgba(0,0,0,0.10);
      --bodyBg:var(--bg);
      --skelBar:rgba(0,0,0,0.07);
      --outColor:rgba(37,99,235,0.95);
      --accent:#059669;
      --accentBg:rgba(5,150,105,0.08);
      --accentBd:rgba(5,150,105,0.25);
    }

    :root{--radius:16px}

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bodyBg);
      color:var(--text);
      font-family: Inter, "Noto Sans TC", "Noto Sans JP", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
    }

    .wrap{
      max-width:480px;
      margin:0 auto;
      padding:8px;
      padding-top:max(8px, env(safe-area-inset-top));
      padding-bottom:max(8px, env(safe-area-inset-bottom));
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    /* ===== Top bar ===== */
    .toprow{
      display:flex;
      align-items:center;
      gap:6px;
      flex-shrink:0;
    }
    .app-title{
      font-size:13px;
      font-weight:600;
      color:var(--muted);
      letter-spacing:0.3px;
      white-space:nowrap;
    }

    /* ===== Buttons ===== */
    .icon{
      border:0;
      background:transparent;
      color:var(--muted);
      border-radius:12px;
      padding:8px 10px;
      font-size:13px;
      line-height:1;
      cursor:pointer;
      transition:opacity 100ms, background 100ms, color 100ms;
      white-space:nowrap;
      -webkit-user-select:none;
      user-select:none;
    }
    .icon:hover{background:rgba(128,128,128,0.08)}
    .icon:active{background:rgba(128,128,128,0.15)}
    .icon:disabled{opacity:0.3;cursor:not-allowed}
    .icon.primary{color:var(--text);font-weight:500}
    .icon.copied{color:var(--success) !important}

    .icon.speaking{
      color:var(--danger);
      background:var(--dangerBg);
      border:1px solid var(--dangerBd);
    }

    /* ===== Glass speak button (output panel) ===== */
    .btn-speak-out{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex:1;
      padding:16px;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:var(--radius);
      font-size:20px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      flex-shrink:0;
      -webkit-user-select:none;
      user-select:none;
      position:relative;
      overflow:hidden;
      /* Glass effect */
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.08) 100%
      );
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      color:var(--text);
      box-shadow:
        0 0 16px rgba(110,231,183,0.12),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.1),
        0 2px 8px rgba(0,0,0,0.15);
      transition:box-shadow 200ms, transform 80ms, border-color 200ms;
      animation:btn-glow 3s ease-in-out infinite;
    }
    .btn-speak-out::before{
      content:"";
      position:absolute;
      top:0;left:-50%;
      width:50%;height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform:skewX(-20deg);
      animation:glass-shine 4s ease-in-out infinite;
      pointer-events:none;
    }
    .btn-speak-out:active{transform:scale(0.97)}
    .btn-speak-out.speaking{
      color:var(--danger);
      border-color:var(--dangerBd);
      box-shadow:
        0 0 20px rgba(248,113,113,0.25),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.1),
        0 2px 8px rgba(0,0,0,0.15);
      animation:btn-glow-danger 1.5s ease-in-out infinite;
    }
    @keyframes glass-shine{
      0%,100%{left:-50%}
      50%{left:120%}
    }
    @keyframes btn-glow{
      0%,100%{box-shadow:0 0 12px rgba(110,231,183,0.10),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 22px rgba(110,231,183,0.22),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
    }
    @keyframes btn-glow-danger{
      0%,100%{box-shadow:0 0 12px rgba(248,113,113,0.15),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 24px rgba(248,113,113,0.35),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
    }
    /* Ready-to-speak highlight after translation completes (mobile) */
    .btn-speak-out.speak-ready{
      border-color:var(--accentBd);
      animation:speak-ready-pulse 0.8s ease-in-out 3;
    }
    @keyframes speak-ready-pulse{
      0%,100%{box-shadow:0 0 12px rgba(110,231,183,0.15),inset 0 1px 0 rgba(255,255,255,0.15),0 2px 8px rgba(0,0,0,0.12);transform:scale(1)}
      50%{box-shadow:0 0 35px rgba(110,231,183,0.50),inset 0 1px 0 rgba(255,255,255,0.25),0 2px 12px rgba(0,0,0,0.15);transform:scale(1.04)}
    }
    [data-theme="light"] .btn-speak-out{
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.7) 0%,
        rgba(255,255,255,0.4) 40%,
        rgba(255,255,255,0.3) 60%,
        rgba(255,255,255,0.6) 100%
      );
      border-color:rgba(0,0,0,0.10);
      box-shadow:
        0 0 12px rgba(5,150,105,0.10),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(0,0,0,0.04),
        0 2px 8px rgba(0,0,0,0.06);
    }

    /* ===== Bottom action row (translate + speak) ===== */
    .action-row{
      display:flex;
      gap:10px;
      flex-shrink:0;
    }
    .btn-translate{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex:1;
      padding:16px;
      border:none;
      border-radius:var(--radius);
      background:var(--accent);
      color:#000;
      font-size:20px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      transition:opacity 150ms, transform 80ms;
      -webkit-user-select:none;
      user-select:none;
    }
    .btn-translate:active{transform:scale(0.98)}
    .btn-translate:disabled{opacity:0.4;cursor:not-allowed;transform:none}

    /* ===== Divider between panels ===== */
    .panel-divider{
      width:100%;
      height:1px;
      background:var(--border);
      flex-shrink:0;
      margin:2px 0;
    }

    /* ===== Panel ===== */
    .panel{
      position:relative;
      border-radius:var(--radius);
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      border:1px solid var(--border);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
      flex:1;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 10px 4px;
      font-size:12px;
      color:var(--muted);
      flex-shrink:0;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:3px 8px;
      border-radius:10px;
      background:var(--chipBg);
      border:1px solid var(--chipBd);
      color:var(--muted);
      font-size:12px;
      font-weight:500;
    }

    .count{opacity:0.6;font-size:11px}
    .actions{display:flex;align-items:center;gap:2px}

    textarea{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      padding:6px 14px 14px;
      resize:none;
      outline:none;
      font-size:24px;
      font-weight:600;
      line-height:1.75;
      letter-spacing:0.02em;
      flex:1;
      min-height:0;
      overflow:auto;
      font-family:"Noto Serif TC", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    }

    .output-text{
      margin:0;
      width:100%;
      border:0;
      background:transparent;
      color:var(--outColor);
      padding:6px 14px 14px;
      font-size:24px;
      font-weight:600;
      line-height:1.75;
      letter-spacing:0.02em;
      flex:1;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      outline:none;
      cursor:text;
      font-family:"Noto Serif TC", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    }
    .output-text:focus{
      box-shadow:inset 0 0 0 1px rgba(128,128,128,0.12);
      border-radius:4px;
    }
    .output-text:empty::before{
      content:attr(data-placeholder);
      color:var(--muted);
      opacity:0.35;
      font-style:italic;
      pointer-events:none;
    }

    /* ===== Skeleton loading ===== */
    @keyframes skeleton-pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
    .panel.loading .output-text::before{
      content:"" !important;
      display:block;
      height:100%;
      background:
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 0 / 85% 28px,
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 28px / 70% 28px,
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 56px / 90% 28px;
      background-repeat:no-repeat;
      animation:skeleton-pulse 1.5s ease-in-out infinite;
      border-radius:4px;
    }

    /* ===== Speaking glow ===== */
    .speaking-glow{position:relative}
    .speaking-glow::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      animation:pulse-glow 1.5s ease-in-out infinite;
    }
    @keyframes pulse-glow{
      0%,100%{box-shadow:inset 0 0 20px rgba(16,185,129,0.05)}
      50%{box-shadow:inset 0 0 30px rgba(16,185,129,0.15)}
    }

    /* ===== TTS stop FAB ===== */
    /* ===== Toast ===== */
    #toastHost{
      position:fixed;
      bottom:max(16px, env(safe-area-inset-bottom, 16px));
      left:50%;
      transform:translateX(-50%);
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      pointer-events:none;
      max-width:340px;
      width:90%;
    }
    .toast-item{
      background:var(--toastBg);
      color:var(--muted);
      border:1px solid var(--toastBd);
      border-radius:12px;
      padding:10px 16px;
      font-size:13px;
      line-height:1.5;
      white-space:pre-line;
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      opacity:0;
      transform:translateY(8px);
      transition:opacity 120ms ease,transform 120ms ease;
      pointer-events:auto;
      cursor:pointer;
      text-align:center;
    }
    .toast-item.show{opacity:1;transform:translateY(0)}
    .toast-item.out{opacity:0;transform:translateY(8px);transition-duration:180ms}
    .toast-item.toast-error{border-color:var(--dangerBd);background:var(--dangerBg);color:var(--danger)}
    .toast-item.toast-undo{border-color:var(--blueBd);background:var(--blueBg)}
    .toast-item .undo-link{color:var(--blue);font-weight:600;text-decoration:underline;cursor:pointer;margin-left:6px}

    /* ===== Settings overlay ===== */
    .overlay{
      position:fixed;inset:0;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(8px);
      z-index:50;
    }
    .overlay.show{display:flex}
    .modal{
      width:100%;
      max-width:480px;
      border-radius:22px 22px 0 0;
      background:var(--toastBg);
      border:1px solid var(--toastBd);
      border-bottom:none;
      box-shadow:0 -8px 40px rgba(0,0,0,0.35);
      padding:14px;
      padding-bottom:max(14px, env(safe-area-inset-bottom));
      max-height:85vh;
      overflow-y:auto;
    }
    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:var(--muted);
      font-size:12px;
      padding:4px 6px;
    }
    .modal-handle{
      width:36px;
      height:4px;
      border-radius:2px;
      background:rgba(128,128,128,0.3);
      margin:0 auto 8px;
    }
    .field{
      display:grid;
      gap:6px;
      margin-top:10px;
      padding:10px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel);
    }
    .field label{font-size:12px;color:var(--muted)}
    .in, .modal select{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(128,128,128,0.06);
      color:var(--text);
      padding:12px;
      outline:none;
      font-size:14px;
      font-family:inherit;
    }
    .in:focus, .modal select:focus{border-color:var(--focus)}
    .tog{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .tog span{font-size:13px;color:var(--muted)}
    .hint{font-size:11px;color:var(--muted);opacity:0.5;padding:4px 6px}

    /* Toggle switch */
    .switch{position:relative;width:44px;height:26px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .switch .slider{
      position:absolute;inset:0;
      background:rgba(128,128,128,0.25);
      border-radius:13px;
      cursor:pointer;
      transition:background 200ms;
    }
    .switch .slider::before{
      content:"";
      position:absolute;
      left:3px;top:3px;
      width:20px;height:20px;
      background:#fff;
      border-radius:50%;
      transition:transform 200ms;
    }
    .switch input:checked + .slider{background:var(--accent)}
    .switch input:checked + .slider::before{transform:translateX(18px)}

    /* ===== Mic buttons row ===== */
    .mic-row{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }
    .btn-mic{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 10px;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:var(--radius);
      font-size:15px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
      position:relative;
      overflow:hidden;
      transition:box-shadow 200ms, transform 80ms, border-color 200ms, background 200ms;
      /* Glass base */
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.04) 40%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.07) 100%
      );
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.12);
    }
    .btn-mic::before{
      content:"";
      position:absolute;
      top:0;left:-60%;
      width:50%;height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transform:skewX(-20deg);
      animation:glass-shine 5s ease-in-out infinite;
      pointer-events:none;
    }
    .btn-mic:active{transform:scale(0.97)}
    .btn-mic .mic-icon{font-size:20px}
    .btn-mic .mic-lang{font-size:14px;font-weight:600}
    .btn-mic .mic-hint{font-size:11px;opacity:0.5;font-weight:400}

    /* Recording state — fully red button */
    .btn-mic.recording{
      border-color:rgba(220,38,38,0.8);
      background:linear-gradient(
        135deg,
        rgba(220,38,38,0.85) 0%,
        rgba(239,68,68,0.90) 50%,
        rgba(220,38,38,0.85) 100%
      );
      color:#fff;
      animation:mic-pulse 1.5s ease-in-out infinite;
    }
    .btn-mic.recording .mic-icon{
      animation:mic-bounce 0.8s ease-in-out infinite;
      color:#fff;
    }
    .btn-mic.recording .mic-lang{
      color:#fff;
    }
    @keyframes mic-pulse{
      0%,100%{box-shadow:0 0 10px rgba(220,38,38,0.3),inset 0 1px 0 rgba(255,255,255,0.20),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 28px rgba(220,38,38,0.55),inset 0 1px 0 rgba(255,255,255,0.25),0 2px 8px rgba(0,0,0,0.12)}
    }
    @keyframes mic-bounce{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.2)}
    }

    /* Blinking border on textarea when mic is recording */
    #srcPanel.recording-active{
      border-color:rgba(220,38,38,0.8);
      animation:recording-border 1s ease-in-out infinite;
    }
    #srcPanel.recording-active textarea{
      caret-color:var(--danger);
    }
    @keyframes recording-border{
      0%,100%{border-color:rgba(220,38,38,0.8);box-shadow:0 0 18px rgba(220,38,38,0.35),inset 0 0 8px rgba(220,38,38,0.08)}
      50%{border-color:rgba(220,38,38,0.3);box-shadow:0 0 6px rgba(220,38,38,0.10),inset 0 0 2px rgba(220,38,38,0.02)}
    }

    /* Light theme mic */
    [data-theme="light"] .btn-mic{
      border-color:rgba(0,0,0,0.08);
      background:linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.5) 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(0,0,0,0.03),0 2px 8px rgba(0,0,0,0.05);
    }

    /* Unsupported state */
    .btn-mic:disabled{opacity:0.35;cursor:not-allowed;animation:none}

    @media (prefers-reduced-motion: reduce){
      .toast-item,.toast-item.show,.toast-item.out{transform:translateX(-50%)}
      .panel.loading .output-text::before{animation:none;opacity:0.5}
      .btn-mic.recording{animation:none}
      .btn-mic.recording .mic-icon{animation:none}
      #srcPanel.recording-active{animation:none;border-color:rgba(220,38,38,0.8)}
      .btn-speak-out.speak-ready{animation:none}
    }
  </style>
</head>
<body>

  <!-- Settings overlay (bottom sheet style for iPhone) -->
  <div class="overlay" id="settingsOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-handle"></div>
      <div class="modalHead">
        <span style="letter-spacing:0.15em;text-transform:uppercase;font-weight:600">設定</span>
        <button class="icon" id="btnCloseSettings" aria-label="關閉設定" title="關閉">✕</button>
      </div>

      <div class="field">
        <label for="apiKey">OpenAI API Key</label>
        <input class="in" id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />
        <div class="hint">輸入一次後會自動記住，下次不用重新輸入</div>
      </div>

      <div class="field">
        <div class="tog">
          <span>輸入時自動翻譯</span>
          <label class="switch"><input id="auto" type="checkbox" /><span class="slider"></span></label>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:12px;">
        <button class="icon primary" id="btnDone" style="padding:10px 20px;font-size:14px;" title="完成">完成</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- Top bar -->
    <div class="toprow">
      <span class="app-title">🇯🇵 旅日翻譯</span>
      <span style="flex:1"></span>
      <button class="icon" id="btnTheme" aria-label="切換主題" title="切換主題">◑</button>
      <button class="icon" id="btnSettings" aria-label="設定" title="設定">⚙</button>
    </div>

    <!-- Mic buttons -->
    <div class="mic-row">
      <button class="btn-mic" id="btnMicZh" aria-label="中文語音輸入">
        <span class="mic-icon">🎤</span>
        <span class="mic-lang">中文</span>
      </button>
      <button class="btn-mic" id="btnMicJa" aria-label="日本語語音輸入">
        <span class="mic-icon">🎤</span>
        <span class="mic-lang">日本語</span>
      </button>
    </div>

    <!-- Source panel -->
    <section class="panel" id="srcPanel">
      <div class="bar">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="chip" id="srcChip">中文</span>
          <span class="count" id="srcCount">0</span>
        </div>
        <div class="actions">
          <button class="icon" id="btnSpeakSrc" aria-label="朗讀原文" title="朗讀">🔊</button>
          <button class="icon" id="btnCopySrc" aria-label="複製原文" title="複製">⎘</button>
          <button class="icon" id="btnClear" aria-label="清除" title="清除">⌫</button>
        </div>
      </div>
      <textarea id="src" placeholder="輸入中文或日文…"></textarea>
    </section>

    <!-- Divider between panels -->
    <div class="panel-divider"></div>

    <!-- Output panel -->
    <section class="panel" id="outPanel">
      <div class="bar">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="chip" id="outChip">日本語</span>
          <span class="count" id="outStatus"></span>
          <span class="count" id="outCount"></span>
        </div>
        <div class="actions">
          <button class="icon" id="btnCopyOut" aria-label="複製翻譯" title="複製">⎘</button>
        </div>
      </div>
      <div class="output-text" id="out" contenteditable="true" role="textbox" aria-label="翻譯結果" data-placeholder="翻譯結果會顯示在這裡…"></div>
    </section>

    <!-- Action row: Translate + Speak/Mute -->
    <div class="action-row">
      <button class="btn-translate" id="btnTranslate" aria-label="翻譯">翻譯</button>
      <button class="btn-speak-out" id="btnSpeakOut" aria-label="朗讀">🔊 朗讀</button>
    </div>
  </div>

  <!-- Toast host -->
  <div id="toastHost"></div>

  <script>
    // --- Configuration ---
    const CONFIG = {
      DEBOUNCE_MS: 600,
      TEMP_TRANSLATE: 0.1,
      TEMP_REFINE: 0.4,
      MOBILE_BREAKPOINT: 900,
      API_BASE: 'https://api.openai.com/v1',
      TTS_BASE: 'https://api.openai.com/v1/audio/speech',
      TTS_VOICE: 'nova',
      TTS_TIMEOUT_MIN_MS: 15000,
      COPY_FLASH_MS: 1200,
      TOAST_MS: 3000,
      UNDO_MS: 5000,
      TOAST_COOLDOWN_MS: 800,
      SRC_PERSIST_DEBOUNCE_MS: 1000,
    };

    const STORAGE_KEYS = {
      API_KEY: 'jptw_api_key',
      AUTO: 'jptw_auto',
      THEME: 'jptw_theme',
      SRC_TEXT: 'jptw_src_text',
      DIRECTION: 'jptw_direction',
    };

    const TRANSLATE_MODEL = 'gpt-5.4-mini';
    const TRANSLATE_FALLBACK = [TRANSLATE_MODEL, 'gpt-5.4-nano', 'gpt-4o'];
    const REFINE_FALLBACK = ['gpt-5.4', TRANSLATE_MODEL, 'gpt-4o'];

    // --- Language config ---
    const LANG = {
      'zh-TW': {
        display: '中文',
        tts: { localLang: 'zh-TW' },
        promptName: '繁體中文（台灣）',
        translateExtra: '\n用詞以台灣常用說法，避免簡體用語，標點採全形。口吻自然。',
      },
      'ja': {
        display: '日本語',
        tts: { localLang: 'ja-JP' },
        promptName: '日本語',
        translateExtra: '\n自然で読みやすい標準的な文体で訳す。旅行会話でも丁寧語（です・ます）を基本とする。',
      },
    };

    // --- State ---
    const state = {
      apiKey: (localStorage.getItem(STORAGE_KEYS.API_KEY) || '').trim(),
      auto: (localStorage.getItem(STORAGE_KEYS.AUTO) ?? '1') === '1',
      theme: localStorage.getItem(STORAGE_KEYS.THEME) || 'dark',
      // direction: 'zh2ja' or 'ja2zh'
      direction: localStorage.getItem(STORAGE_KEYS.DIRECTION) || 'zh2ja',
      busy: false,
      controller: null,
      debounce: null,
      srcPersistTimer: null,
      // TTS
      speaking: false,
      speakingTarget: null, // 'src' or 'out'
      audioEl: null,
      ttsTimeout: null,
      ttsController: null,
      // HD TTS cache: { text, lang, audio }
      hdCache: null,
      hdPreloading: false,
      hdAbortController: null,
    };

    // --- Utilities ---
    function isAbortError(e) { return e && (e.name === 'AbortError' || e.code === 20); }

    async function safeReadText(res) {
      try { return await res.text(); } catch { return ''; }
    }

    function isInvalidModelError(status, bodyText) {
      const t = (bodyText || '').toLowerCase();
      return status === 404 || /invalid_model|model.*not found|no such model|unknown model/.test(t);
    }

    // --- DOM ---
    const $ = (id) => document.getElementById(id);
    const el = {
      settingsOverlay: $('settingsOverlay'),
      btnSettings: $('btnSettings'),
      btnCloseSettings: $('btnCloseSettings'),
      btnDone: $('btnDone'),
      btnTheme: $('btnTheme'),
      apiKey: $('apiKey'),
      auto: $('auto'),
      src: $('src'),
      srcChip: $('srcChip'),
      srcCount: $('srcCount'),
      outChip: $('outChip'),
      outCount: $('outCount'),
      outStatus: $('outStatus'),
      out: $('out'),
      outPanel: $('outPanel'),
      srcPanel: $('srcPanel'),
      btnTranslate: $('btnTranslate'),
      btnCopySrc: $('btnCopySrc'),
      btnCopyOut: $('btnCopyOut'),
      btnClear: $('btnClear'),
      btnSpeakSrc: $('btnSpeakSrc'),
      btnSpeakOut: $('btnSpeakOut'),
      btnMicZh: $('btnMicZh'),
      btnMicJa: $('btnMicJa'),
    };

    // Init from state
    el.apiKey.value = state.apiKey;
    el.auto.checked = state.auto;

    // Restore source text
    const savedSrc = localStorage.getItem(STORAGE_KEYS.SRC_TEXT) || '';
    if (savedSrc) el.src.value = savedSrc;

    // --- Toast system ---
    const toastHost = $('toastHost');
    let _lastToastMsg = '', _lastToastTime = 0;

    function toast(msg, type, durationMs) {
      const now = Date.now();
      if (msg === _lastToastMsg && (now - _lastToastTime) < CONFIG.TOAST_COOLDOWN_MS) return null;
      _lastToastMsg = msg;
      _lastToastTime = now;

      const duration = durationMs || CONFIG.TOAST_MS;
      const item = document.createElement('div');
      item.className = 'toast-item' + (type ? ' toast-' + type : '');
      item.textContent = msg;
      toastHost.appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('show')));

      const dismiss = () => {
        item.classList.remove('show');
        item.classList.add('out');
        setTimeout(() => item.remove(), 200);
      };
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('undo-link')) return;
        dismiss();
      });
      const timer = setTimeout(dismiss, duration);
      return { item, dismiss, timer };
    }

    function toastError(msg) { toast(msg, 'error', 5000); }

    function toastUndo(msg, onUndo) {
      const t = toast(msg, 'undo', CONFIG.UNDO_MS);
      if (!t) return;
      const link = document.createElement('span');
      link.className = 'undo-link';
      link.textContent = '復原';
      t.item.appendChild(link);
      link.addEventListener('click', (e) => {
        e.stopPropagation();
        clearTimeout(t.timer);
        t.dismiss();
        if (onUndo) onUndo();
      });
    }

    // --- Direction helpers ---
    function getSrcLang() { return state.direction === 'zh2ja' ? 'zh-TW' : 'ja'; }
    function getTgtLang() { return state.direction === 'zh2ja' ? 'ja' : 'zh-TW'; }

    function updateDirectionUI() {
      const src = LANG[getSrcLang()].display;
      const tgt = LANG[getTgtLang()].display;
      el.srcChip.textContent = src;
      el.outChip.textContent = tgt;
      el.src.placeholder = `輸入${src}…`;
    }

    function autoDetectDirection(text) {
      const t = (text || '').trim();
      if (!t) return;
      const hasKana = /[\u3040-\u30ff]/.test(t);
      if (hasKana) {
        if (state.direction !== 'ja2zh') {
          state.direction = 'ja2zh';
          localStorage.setItem(STORAGE_KEYS.DIRECTION, state.direction);
          updateDirectionUI();
        }
      } else if (/[，。！？、；：「」『』（）\u3100-\u312f]/.test(t)) {
        if (state.direction !== 'zh2ja') {
          state.direction = 'zh2ja';
          localStorage.setItem(STORAGE_KEYS.DIRECTION, state.direction);
          updateDirectionUI();
        }
      }
    }

    // --- Theme ---
    function applyTheme(theme) {
      state.theme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(STORAGE_KEYS.THEME, theme);
      el.btnTheme.textContent = theme === 'dark' ? '◑' : '◐';
    }

    el.btnTheme.addEventListener('click', () => applyTheme(state.theme === 'dark' ? 'light' : 'dark'));
    applyTheme(state.theme);
    updateDirectionUI();

    // --- UX ---
    function setBusy(isBusy) {
      state.busy = isBusy;
      el.btnTranslate.disabled = isBusy;
      const outText = el.out.textContent.trim();
      el.btnCopySrc.disabled = !el.src.value.trim();
      el.btnCopyOut.disabled = !outText;
      el.btnClear.disabled = !el.src.value.trim() && !outText;
      el.outPanel.classList.toggle('loading', isBusy && !outText);
    }

    function persistSrcText() {
      if (state.srcPersistTimer) clearTimeout(state.srcPersistTimer);
      state.srcPersistTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEYS.SRC_TEXT, el.src.value);
      }, CONFIG.SRC_PERSIST_DEBOUNCE_MS);
    }

    // --- Copy ---
    async function copyText(text, btnEl) {
      const t = (text || '').trim();
      if (!t) return;
      try {
        await navigator.clipboard.writeText(t);
        if (btnEl) {
          const orig = btnEl.textContent;
          btnEl.textContent = '✓';
          btnEl.classList.add('copied');
          setTimeout(() => {
            btnEl.textContent = orig;
            btnEl.classList.remove('copied');
          }, CONFIG.COPY_FLASH_MS);
        }
      } catch (e) {
        console.warn('Clipboard write failed:', e.message);
      }
    }

    // --- ContentEditable paste ---
    el.out.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    el.out.addEventListener('input', () => {
      const text = el.out.textContent.trim();
      el.outCount.textContent = text ? String(text.length) : '';
    });

    // Preload browser voices
    if ('speechSynthesis' in window) {
      speechSynthesis.getVoices();
      speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
    }

    // --- Settings ---
    el.btnSettings.addEventListener('click', () => openSettings(true));
    el.btnCloseSettings.addEventListener('click', () => openSettings(false));
    el.btnDone.addEventListener('click', () => openSettings(false));
    el.settingsOverlay.addEventListener('click', (e) => {
      if (e.target === el.settingsOverlay) openSettings(false);
    });

    function openSettings(show) {
      el.settingsOverlay.classList.toggle('show', !!show);
      el.settingsOverlay.setAttribute('aria-hidden', show ? 'false' : 'true');
      if (show) el.apiKey.focus();
    }

    el.apiKey.addEventListener('input', (e) => {
      state.apiKey = e.target.value.trim();
    });
    el.apiKey.addEventListener('blur', () => {
      localStorage.setItem(STORAGE_KEYS.API_KEY, state.apiKey);
    });

    el.auto.addEventListener('change', (e) => {
      state.auto = !!e.target.checked;
      localStorage.setItem(STORAGE_KEYS.AUTO, state.auto ? '1' : '0');
    });

    // --- TTS ---
    el.btnSpeakSrc.addEventListener('click', () => toggleSpeak('src'));
    el.btnSpeakOut.addEventListener('click', () => toggleSpeak('out'));
    function toggleSpeak(target) {
      el.btnSpeakOut.classList.remove('speak-ready');
      if (state.speaking && state.speakingTarget === target) {
        stopSpeaking();
        return;
      }
      const text = target === 'src' ? el.src.value : el.out.textContent;
      const lang = target === 'src' ? getSrcLang() : getTgtLang();
      speak(text, lang, target);
    }

    async function speak(text, lang, target) {
      if (!text?.trim()) return;
      if (state.speaking) stopSpeaking();

      const cfg = LANG[lang].tts;
      state.speaking = true;
      state.speakingTarget = target;
      const btn = target === 'src' ? el.btnSpeakSrc : el.btnSpeakOut;
      const panel = target === 'src' ? el.srcPanel : el.outPanel;
      btn.textContent = target === 'src' ? '⏹' : '⏹ 停止朗讀';
      btn.classList.add('speaking');
      panel.classList.add('speaking-glow');

      const onDone = () => {
        if (state.ttsTimeout) { clearTimeout(state.ttsTimeout); state.ttsTimeout = null; }
        btn.textContent = target === 'src' ? '🔊' : '🔊 朗讀';
        btn.classList.remove('speaking');
        panel.classList.remove('speaking-glow');
        state.speaking = false;
        state.speakingTarget = null;
        state.audioEl = null;
      };

      const charMs = /[\u3040-\u9fff]/.test(text) ? 120 : 80;
      const dynamicTimeout = Math.max(CONFIG.TTS_TIMEOUT_MIN_MS, text.length * charMs);

      const startSafetyTimer = (multiplier) => {
        const timeout = dynamicTimeout * (multiplier || 1);
        state.ttsTimeout = setTimeout(() => {
          if (state.speaking && state.speakingTarget === target) stopSpeaking();
        }, timeout);
      };

      const ttsAc = new AbortController();
      state.ttsController = ttsAc;

      // Check if HD audio is cached for this exact text
      if (state.hdCache && state.hdCache.text === text && state.hdCache.lang === lang && state.hdCache.audio) {
        try {
          const audio = state.hdCache.audio;
          audio.currentTime = 0;
          state.audioEl = audio;
          audio.onended = onDone;
          audio.onerror = onDone;
          await audio.play();
          // Use actual audio duration for timeout (more accurate than character estimate)
          const hdTimeout = (isFinite(audio.duration) ? audio.duration * 1000 : dynamicTimeout) + 5000;
          state.ttsTimeout = setTimeout(() => {
            if (state.speaking && state.speakingTarget === target) stopSpeaking();
          }, hdTimeout);
          return;
        } catch {
          state.audioEl = null;
          // Fall through to browser TTS
        }
      }

      // First play: use browser TTS (instant), preload HD in background
      if ('speechSynthesis' in window) {
        try {
          const u = speakLocal(text, cfg.localLang);
          startSafetyTimer(3); // 3x buffer — onend handles normal completion
          u.onend = u.onerror = onDone;
          // Start HD preload in background (won't interrupt current playback)
          preloadHD(text, lang);
          return;
        } catch { /* fall through */ }
      }

      // Fallback: try cloud TTS directly if no browser TTS
      if (state.apiKey) {
        try {
          const audio = await speakCloud(text, ttsAc.signal);
          if (ttsAc.signal.aborted) return;
          state.audioEl = audio;
          audio.onended = onDone;
          audio.onerror = onDone;
          try {
            await audio.play();
            const hdTimeout = (isFinite(audio.duration) ? audio.duration * 1000 : dynamicTimeout) + 5000;
            state.ttsTimeout = setTimeout(() => {
              if (state.speaking && state.speakingTarget === target) stopSpeaking();
            }, hdTimeout);
          } catch { state.audioEl = null; }
          if (state.audioEl) return;
        } catch (e) {
          if (ttsAc.signal.aborted) return;
        }
      }

      onDone();
    }

    async function speakCloud(text, signal) {
      const res = await fetch(CONFIG.TTS_BASE, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`,
        },
        body: JSON.stringify({
          model: 'tts-1',
          input: text,
          voice: CONFIG.TTS_VOICE,
          response_format: 'mp3',
        }),
        signal,
      });
      if (!res.ok) {
        const body = await res.text();
        let msg = `TTS ${res.status}`;
        try { msg = JSON.parse(body)?.error?.message || msg; } catch {}
        throw new Error(msg);
      }
      // Use base64 data URL instead of blob URL to avoid iOS Safari
      // premature 'ended' event bug with blob URLs
      const buf = await res.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);
      const audio = new Audio(`data:audio/mp3;base64,${b64}`);
      // Wait for metadata to load before returning
      await new Promise((resolve, reject) => {
        audio.addEventListener('loadedmetadata', resolve, { once: true });
        audio.addEventListener('error', reject, { once: true });
        audio.load();
      });
      return audio;
    }

    function speakLocal(text, localLang) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = localLang;
      const voices = speechSynthesis.getVoices();
      const best = voices.find(v => v.lang === localLang && v.name.includes('Google'))
                || voices.find(v => v.lang === localLang)
                || voices.find(v => v.lang.startsWith(localLang.split('-')[0]) && v.name.includes('Google'))
                || voices.find(v => v.lang.startsWith(localLang.split('-')[0]));
      if (best) u.voice = best;
      speechSynthesis.speak(u);
      return u;
    }

    // Preload OpenAI HD audio in background for second play
    function preloadHD(text, lang) {
      if (!state.apiKey) return;
      // Skip if already cached for same text
      if (state.hdCache && state.hdCache.text === text && state.hdCache.lang === lang) return;
      // Abort any in-flight preload before starting a new one
      if (state.hdAbortController) {
        state.hdAbortController.abort();
        state.hdAbortController = null;
      }

      state.hdPreloading = true;
      state.hdCache = null;
      const ac = new AbortController();
      state.hdAbortController = ac;

      speakCloud(text, ac.signal)
        .then(audio => {
          state.hdCache = { text, lang, audio };
        })
        .catch(() => {})
        .finally(() => {
          state.hdPreloading = false;
          if (state.hdAbortController === ac) state.hdAbortController = null;
        });
    }

    function clearHDCache() {
      if (state.hdAbortController) {
        state.hdAbortController.abort();
        state.hdAbortController = null;
      }
      state.hdCache = null;
      state.hdPreloading = false;
    }

    function stopSpeaking() {
      if (state.ttsTimeout) { clearTimeout(state.ttsTimeout); state.ttsTimeout = null; }
      if (state.ttsController) { state.ttsController.abort(); state.ttsController = null; }
      if (state.audioEl) {
        state.audioEl.pause();
        state.audioEl.currentTime = 0;
        state.audioEl = null;
      }
      if ('speechSynthesis' in window) speechSynthesis.cancel();

      if (state.speakingTarget) {
        const btn = state.speakingTarget === 'src' ? el.btnSpeakSrc : el.btnSpeakOut;
        const panel = state.speakingTarget === 'src' ? el.srcPanel : el.outPanel;
        btn.textContent = state.speakingTarget === 'src' ? '🔊' : '🔊 朗讀';
        btn.classList.remove('speaking');
        panel.classList.remove('speaking-glow');
      }
      state.speaking = false;
      state.speakingTarget = null;
    }

    // --- Speech Recognition (Mic buttons) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let activeRecognition = null;
    let activeMicLang = null;

    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    if (!SpeechRecognition) {
      el.btnMicZh.disabled = true;
      el.btnMicJa.disabled = true;
      if (isStandalone && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
        el.btnMicZh.title = 'PWA 模式不支援語音，請用 Safari 開啟';
        el.btnMicJa.title = 'PWA 模式不支援語音，請用 Safari 開啟';
        toast('語音輸入需在 Safari 中使用，PWA 模式暫不支援');
      } else {
        el.btnMicZh.title = '此瀏覽器不支援語音輸入';
        el.btnMicJa.title = '此瀏覽器不支援語音輸入';
      }
    }

    el.btnMicZh.addEventListener('click', () => toggleMic('zh-TW'));
    el.btnMicJa.addEventListener('click', () => toggleMic('ja'));

    function toggleMic(lang) {
      if (activeRecognition && activeMicLang === lang) {
        // User manually stops recording — stop mic then translate
        stopMic();
        const text = el.src.value.trim();
        if (text) translateNow().catch(() => {});
        return;
      }
      if (activeRecognition) {
        // Switching language — stop current mic, wait briefly for onend, then start new
        stopMic();
        setTimeout(() => startMic(lang), 120);
        return;
      }
      startMic(lang);
    }

    function startMic(lang) {
      if (!SpeechRecognition) return;

      // Set translation direction based on mic language
      const newDirection = lang === 'zh-TW' ? 'zh2ja' : 'ja2zh';
      if (state.direction !== newDirection) {
        state.direction = newDirection;
        localStorage.setItem(STORAGE_KEYS.DIRECTION, state.direction);
        updateDirectionUI();
      }

      // Set textarea lang attribute to hint iOS keyboard
      el.src.setAttribute('lang', lang === 'zh-TW' ? 'zh-TW' : 'ja');

      const recognition = new SpeechRecognition();
      recognition.lang = lang === 'zh-TW' ? 'zh-TW' : 'ja-JP';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      // Try to start recognition BEFORE clearing input
      try {
        recognition.start();
        console.log('SpeechRecognition started for', lang);
      } catch (e) {
        console.error('SpeechRecognition start failed:', e);
        toastError('無法啟動語音辨識：' + (e.message || e));
        return; // Don't clear input if start failed
      }

      // Start succeeded — now safe to clear input
      activeRecognition = recognition;
      activeMicLang = lang;
      abortInFlight();
      el.src.value = '';
      el.srcCount.textContent = '0';
      el.out.textContent = '';
      el.outCount.textContent = '';
      el.outStatus.textContent = '';
      persistSrcText();

      const btn = lang === 'zh-TW' ? el.btnMicZh : el.btnMicJa;
      const otherBtn = lang === 'zh-TW' ? el.btnMicJa : el.btnMicZh;
      btn.classList.add('recording');
      otherBtn.classList.remove('recording');
      btn.querySelector('.mic-icon').textContent = '⏹';
      btn.querySelector('.mic-lang').textContent = '停止';
      el.srcPanel.classList.add('recording-active');
      // Don't focus textarea on iOS — keyboard popup can block mic permission
      if (!/iPhone|iPad|iPod/.test(navigator.userAgent)) {
        el.src.focus();
      }

      let finalTranscript = '';

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript;
          } else {
            interim += transcript;
          }
        }
        el.src.value = finalTranscript + interim;
        el.srcCount.textContent = String(el.src.value.length);
        persistSrcText();
      };

      recognition.onerror = (event) => {
        console.error('SpeechRecognition error:', event.error, event.message);
        if (event.error === 'no-speech') {
          toast('沒有偵測到語音，請再試一次');
        } else if (event.error === 'not-allowed') {
          toastError('請允許麥克風權限：請到 設定 → Safari → 麥克風 開啟');
        } else if (event.error !== 'aborted') {
          toastError('語音辨識錯誤：' + event.error);
        }
        stopMic();
      };

      recognition.onend = () => {
        // Auto-translate after speech ends (translateNow auto-speaks when done)
        if (activeRecognition === recognition) {
          stopMic();
          const text = el.src.value.trim();
          if (text) translateNow().catch(() => {});
        }
      };

    }

    function stopMic() {
      if (activeRecognition) {
        const rec = activeRecognition;
        activeRecognition = null;
        try { rec.stop(); } catch {}
      }
      el.btnMicZh.classList.remove('recording');
      el.btnMicJa.classList.remove('recording');
      el.btnMicZh.querySelector('.mic-icon').textContent = '🎤';
      el.btnMicJa.querySelector('.mic-icon').textContent = '🎤';
      el.btnMicZh.querySelector('.mic-lang').textContent = '中文';
      el.btnMicJa.querySelector('.mic-lang').textContent = '日本語';
      el.srcPanel.classList.remove('recording-active');
      activeMicLang = null;
    }

    // --- Input events ---
    el.src.addEventListener('input', () => {
      el.srcCount.textContent = String(el.src.value.length);
      setBusy(state.busy);
      persistSrcText();
      autoDetectDirection(el.src.value);

      if (!state.auto) return;
      if (state.debounce) clearTimeout(state.debounce);
      if (!el.src.value.trim()) {
        el.out.textContent = '';
        el.outCount.textContent = '';
        return;
      }
      state.debounce = setTimeout(() => translateNow().catch(() => {}), CONFIG.DEBOUNCE_MS);
    });

    el.btnTranslate.addEventListener('click', () => translateNow().catch(() => {}));
    el.btnCopySrc.addEventListener('click', () => copyText(el.src.value, el.btnCopySrc));
    el.btnCopyOut.addEventListener('click', () => copyText(el.out.textContent, el.btnCopyOut));

    // --- Clear with undo ---
    el.btnClear.addEventListener('click', () => {
      stopSpeaking();
      const srcText = el.src.value;
      const outText = el.out.textContent;
      if (!srcText.trim() && !outText.trim()) return;

      const snapshot = { src: srcText, out: outText };

      abortInFlight();
      el.src.value = '';
      el.srcCount.textContent = '0';
      el.out.textContent = '';
      el.outCount.textContent = '';
      setBusy(false);
      persistSrcText();

      toastUndo('已清除 ', () => {
        el.src.value = snapshot.src;
        el.srcCount.textContent = String(snapshot.src.length);
        el.out.textContent = snapshot.out;
        el.outCount.textContent = snapshot.out.trim() ? String(snapshot.out.length) : '';
        setBusy(false);
        persistSrcText();
      });
    });

    // --- Keyboard shortcuts ---
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (el.settingsOverlay.classList.contains('show')) {
          openSettings(false);
        } else {
          abortInFlight();
        }
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        if (!state.busy) translateNow().catch(() => {});
      }
    });

    function abortInFlight() {
      if (state.debounce) { clearTimeout(state.debounce); state.debounce = null; }
      if (state.controller) {
        try { state.controller.abort(); } catch {}
      }
      state.controller = null;
      setBusy(false);
    }

    // --- Model fallback chain ---
    function modelChain(type) {
      return type === 'refine' ? REFINE_FALLBACK : TRANSLATE_FALLBACK;
    }

    // --- Prompt builders ---
    function buildSystemPrompt(tgtLang) {
      const lang = LANG[tgtLang];
      return `You are a professional translator specializing in travel-related content between Traditional Chinese (Taiwan) and Japanese.
- Output: ${lang.promptName} only.
- Keep meaning exact; no added or missing information.
- Use polite, natural language suitable for travel scenarios (asking directions, ordering food, shopping, emergencies).
- Preserve: numbers, prices, addresses, proper nouns.
- Do not include explanations—return translation only.${lang.translateExtra}`;
    }

    function buildUserPrompt(text, srcLang, tgtLang) {
      return `Translate from ${srcLang} to ${tgtLang}. Return only the translation.\n\nSOURCE:\n${text}`;
    }

    function buildRefineSystemPrompt(tgtLang) {
      const lang = LANG[tgtLang];
      const extra = {
        'ja': `
- 敬語レベル：旅行者が店員・駅員・ホテルスタッフに話す場面を想定し、丁寧語（です・ます）を基本とする。ただし、友人同士の会話文脈ならカジュアルに。
- 不自然な直訳表現（中国語構文の影響）を徹底的に排除する。
- 日本人が日常的に使う自然な言い回し・コロケーションに置き換える。
- 旅行でよく使うフレーズは、実際に口に出して通じる表現にする（例：「お会計お願いします」「すみません、〜はどこですか」）。
- カタカナ語が自然な場合はカタカナを使う（例：レストラン、ホテル、チェックイン）。`,
        'zh-TW': `
- 用詞必須是台灣人日常口語說法，不可出現中國大陸用語（如「信息」→「資訊」、「軟件」→「軟體」、「視頻」→「影片」）。
- 標點全形（，、。！？），括號用全形。
- 語氣自然親切，像台灣人在跟朋友分享旅遊經驗的口吻。
- 日文專有名詞保留原文並加括號中文註解（首次出現時）。
- 旅遊場景常見詞彙使用台灣慣用翻譯（例：「改札口」→「剪票口」、「切符」→「車票」、「案内所」→「服務台」）。`,
      };
      return `You are a world-class bilingual editor (Traditional Chinese ↔ Japanese) with 15 years of experience in travel content localization.

Your task: AGGRESSIVELY revise a machine-translated draft to reach native-speaker publication quality.

## Core Rules
- Keep all original meaning 100% intact. Do not add, omit, or editorialize.
- Preserve: numbers, prices, addresses, proper nouns, formatting.

## Quality Targets (you MUST hit ALL of these)
1. **Native fluency**: The output must read as if originally written by a native speaker, not translated. Eliminate ALL translationese.
2. **Collocation accuracy**: Use the exact word combinations a native speaker would choose. Avoid awkward or unusual pairings.
3. **Register match**: Match the appropriate formality for a traveler interacting with service staff (polite but not stiff).
4. **Speakability**: The result should sound natural when read aloud — a traveler will use this to communicate directly.
5. **Cultural localization**: Adapt cultural references and expressions to what the target audience actually uses.

## Process
1. Read the source text to fully understand the intent.
2. Read the draft translation and identify ALL issues: unnatural phrasing, wrong collocations, awkward word order, translationese, register mismatch.
3. Rewrite — do not just tweak. If a sentence is awkward, restructure it entirely.
4. Self-check: read your output aloud. Does it sound like a real person wrote it? If not, revise again.
${extra[tgtLang] || ''}`;
    }

    function buildRefineUserPrompt(source, draft, srcLang, tgtLang) {
      return `Aggressively revise this translation to native-speaker quality. Restructure awkward sentences entirely — do not just make minor tweaks.

Source language: ${srcLang}
Target language: ${tgtLang}

SOURCE:
${source}

DRAFT TRANSLATION:
${draft}

Return ONLY the improved translation. No explanations, no notes.`;
    }

    // --- Refine ---
    async function refineTranslation(source, draft, srcLang, tgtLang, signal) {
      if (!draft?.trim()) return draft;

      const makeBody = (model) => ({
        model,
        temperature: CONFIG.TEMP_REFINE,
        messages: [
          { role: 'system', content: buildRefineSystemPrompt(tgtLang) },
          { role: 'user', content: buildRefineUserPrompt(source, draft, srcLang, tgtLang) },
        ],
      });

      let lastText = '';
      for (const model of modelChain('refine')) {
        const res = await fetch(`${CONFIG.API_BASE}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.apiKey}`,
          },
          body: JSON.stringify(makeBody(model)),
          signal,
        });

        if (!res.ok) {
          lastText = await safeReadText(res);
          if (isInvalidModelError(res.status, lastText)) continue;
          return draft; // fallback to draft on error
        }

        const json = await res.json();
        const refined = (json?.choices?.[0]?.message?.content || '').trim();
        return refined || draft;
      }
      return draft;
    }

    // --- Translation ---
    async function translateNow() {
      stopSpeaking();
      stopMic();
      const text = (el.src.value || '').trim();

      if (!state.apiKey) {
        toastError('請先點右上角 ⚙ 輸入 API Key');
        return;
      }
      if (!text) {
        el.out.textContent = '';
        el.outCount.textContent = '';
        return;
      }

      abortInFlight();

      const controller = new AbortController();
      state.controller = controller;
      setBusy(true);

      const srcLang = getSrcLang();
      const tgtLang = getTgtLang();

      el.out.textContent = '';
      el.outCount.textContent = '';
      clearHDCache();

      const makeBody = (model) => ({
        model,
        stream: true,
        temperature: CONFIG.TEMP_TRANSLATE,
        messages: [
          { role: 'system', content: buildSystemPrompt(tgtLang) },
          { role: 'user', content: buildUserPrompt(text, srcLang, tgtLang) },
        ],
      });

      try {
        let res = null;
        let lastText = '';
        for (const model of modelChain('translate')) {
          res = await fetch(`${CONFIG.API_BASE}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${state.apiKey}`,
            },
            body: JSON.stringify(makeBody(model)),
            signal: controller.signal,
          });

          if (res.ok && res.body) break;

          lastText = await safeReadText(res);
          if (!isInvalidModelError(res.status, lastText)) break;
        }

        if (!res || !res.ok || !res.body) {
          const msg = lastText || `HTTP ${res?.status || 0}`;
          if (/401|unauthorized|invalid api key/i.test(msg)) {
            throw new Error('API Key 無效，請到設定重新輸入');
          } else if (/429|rate limit/i.test(msg)) {
            throw new Error('請求太頻繁，請稍後再試');
          }
          throw new Error(msg);
        }

        el.outPanel.classList.remove('loading');

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let domBuf = '';
        let rafId = 0;

        const flush = () => {
          rafId = 0;
          if (controller.signal.aborted) return;
          if (!domBuf) return;
          el.out.appendChild(document.createTextNode(domBuf));
          domBuf = '';
          el.out.scrollTop = el.out.scrollHeight;
        };
        const scheduleFlush = () => { if (!rafId) rafId = requestAnimationFrame(flush); };

        let doneFlag = false;
        while (true) {
          if (controller.signal.aborted) break;
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          while (true) {
            const nl = buffer.indexOf('\n');
            if (nl < 0) break;
            const line = buffer.slice(0, nl);
            buffer = buffer.slice(nl + 1);
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const data = trimmed.slice(5).trim();
            if (!data) continue;
            if (data === '[DONE]') { doneFlag = true; break; }
            try {
              const json = JSON.parse(data);
              const delta = json?.choices?.[0]?.delta?.content || '';
              if (delta) { domBuf += delta; scheduleFlush(); }
            } catch {}
          }
          if (doneFlag) break;
        }

        if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
        flush();
        el.outCount.textContent = el.out.textContent.trim() ? String(el.out.textContent.length) : '';

        // --- Auto refine ---
        const draft = el.out.textContent.trim();
        const draftSnapshot = draft; // snapshot before refine to detect user edits
        if (draft && !controller.signal.aborted) {
          el.outStatus.textContent = '✦ 潤稿中…';
          try {
            const refined = await refineTranslation(text, draft, srcLang, tgtLang, controller.signal);
            const currentText = el.out.textContent.trim();
            // Skip overwrite if user edited the output during refine
            if (!controller.signal.aborted && refined && refined !== draft && currentText === draftSnapshot) {
              el.out.textContent = refined;
              el.outCount.textContent = String(refined.length);
            }
          } catch (refineErr) {
            if (!isAbortError(refineErr)) console.warn('Refine failed:', refineErr);
          }
          el.outStatus.textContent = '';
        }

        // Auto-speak output after translation + refine complete
        if (!controller.signal.aborted && el.out.textContent.trim()) {
          const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
          if (isMobile) {
            // iOS/Android: can't auto-play audio without user gesture
            // Flash the speak button to prompt user, and preload HD
            el.btnSpeakOut.classList.remove('speak-ready');
            void el.btnSpeakOut.offsetWidth; // force reflow for re-trigger
            el.btnSpeakOut.classList.add('speak-ready');
            const tgtLang = getTgtLang();
            preloadHD(el.out.textContent, tgtLang);
          } else {
            toggleSpeak('out');
          }
        }

      } catch (e) {
        if (isAbortError(e)) return;
        toastError(String(e?.message || e));
      } finally {
        el.outStatus.textContent = '';
        if (state.controller === controller) {
          setBusy(false);
          state.controller = null;
        }
      }
    }

    // --- Cleanup ---
    window.addEventListener('beforeunload', () => {
      localStorage.setItem(STORAGE_KEYS.SRC_TEXT, el.src.value);
      if (state.controller) try { state.controller.abort(); } catch {}
      if (state.ttsController) try { state.ttsController.abort(); } catch {}
      if (state.audioEl) try { state.audioEl.pause(); } catch {}
      if ('speechSynthesis' in window) speechSynthesis.cancel();
      if (state.ttsTimeout) clearTimeout(state.ttsTimeout);
    });

    // --- First-run: auto-open settings if no API key ---
    (function init() {
      el.srcCount.textContent = String(el.src.value.length);
      setBusy(false);

      if (!state.apiKey) {
        setTimeout(() => openSettings(true), 400);
      }
    })();
  </script>
</body>
</html>
